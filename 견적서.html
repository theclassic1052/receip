<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000080">
<title>견적서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans KR',sans-serif;background:#e8e8e8;width:100%}
body{padding:8px;overflow-y:auto}

/* A4 비율 컨테이너 */
.page-wrap{width:100%;margin:0 auto}

.quote{background:#fff;border:1px solid #333;padding:8px;width:100%;font-size:11px;overflow-x:hidden}

/* 타이틀 */
.q-title{text-align:center;font-size:32px;font-weight:700;letter-spacing:16px;padding:16px 0 20px;border-bottom:2px solid #333}

/* 상단 정보 박스 */
.top-box{display:flex;flex-wrap:wrap;border:1px solid #333;margin:8px 0}
.top-left{flex:1;min-width:0;border-right:none;border-bottom:1px solid #333;padding:6px 8px;display:flex;flex-direction:column;gap:4px;justify-content:center;align-items:center}
.top-left-row{font-size:12px;font-weight:600;color:#333;text-align:center}
.top-left-row input{border:none;outline:none;font-size:12px;font-weight:600;text-align:center;background:transparent;color:#333;width:180px}
.top-right{flex:1;min-width:0;width:100%}

/* 공급자 테이블 */
.sup-table{width:100%;border-collapse:collapse;height:100%;table-layout:fixed}
.sup-table td{border:1px solid #333;padding:2px 3px;vertical-align:middle;font-size:10px}
.sup-table td:first-child{border-left:none}
.sup-table tr:first-child td{border-top:none}
.sup-table tr:last-child td{border-bottom:none}
.sup-table td:last-child{border-right:none}
.s-lbl{background:#f0f0f0;font-weight:600;text-align:center;width:16px;font-size:10px;word-break:break-all;line-height:1.4;padding:2px}
.s-lbl2{background:#f0f0f0;font-weight:600;text-align:center;white-space:normal;word-break:keep-all;font-size:9px;width:34px;line-height:1.3}
.stamp-cell{position:relative;width:60px;font-size:10px;font-weight:600}
.stamp-img{position:absolute;right:0;top:50%;transform:translateY(-50%);width:44px;height:44px;z-index:5}

/* 금액 행 */
.amount-row{border:1px solid #333;border-top:none;padding:6px 10px;font-size:13px;font-weight:600}
.amount-row input{border:none;outline:none;font-size:13px;font-weight:600;background:transparent;color:#333;width:200px}

/* 품목 테이블 */
.items-wrap{border:1px solid #333;border-top:none}
.items-table{width:100%;border-collapse:collapse;table-layout:fixed}
.items-table th{border:1px solid #333;background:#f0f0f0;font-size:11px;font-weight:600;padding:5px 3px;text-align:center}
.items-table td{border:1px solid #333;padding:3px 4px;height:28px;vertical-align:middle}
.items-table td input{border:none;outline:none;width:100%;font-size:11px;background:transparent;color:#333;padding:1px 0;padding-left:10px}
.items-table td input.right{text-align:right;padding-left:0;padding-right:10px}
.items-table .sub{font-size:11px;text-align:right;color:#333;padding-right:5px;vertical-align:middle}
.items-table tr:first-child td{border-top:none}
.items-table td:first-child{border-left:none}
.items-table td:last-child{border-right:none}
.items-table tr:last-child td{border-bottom:none}

/* 합계/계좌 행 */
.footer-table{width:100%;border-collapse:collapse;border:1px solid #333;border-top:none}
.footer-table td{border:1px solid #333;padding:5px 8px;font-size:11px;vertical-align:middle}
.footer-table td:first-child{border-left:none}
.footer-table td:last-child{border-right:none}
.footer-table tr:last-child td{border-bottom:none}
.footer-table input{border:none;outline:none;font-size:11px;background:transparent;color:#333;width:100%}

/* 컨트롤 바 */
.ctrl-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center}
.ctrl-bar select,.ctrl-bar button{padding:8px 10px;border-radius:6px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;border:1px solid #999}
.ctrl-bar select{background:#fff;color:#333;flex:1;min-width:120px}
.btn-mode{background:#fff;color:#333;border:1px solid #666}
.btn-mode.active{background:#000080;color:#fff;border-color:#000080}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn{flex:1;padding:12px 6px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-add{background:#e8eef8;color:#000080;border:1px solid #000080}
.btn-del{background:#fff0f0;color:#c00;border:1px solid #c00}
.btn-share{background:#000080;color:#fff;flex:2}

/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.sheet{background:#fff;width:100%;max-width:600px;border-radius:16px 16px 0 0;padding:20px 16px 32px}
.sheet-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:14px}
.share-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.s-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 4px;border-radius:10px;border:1px solid #e0e0e0;background:#f8f8f8;cursor:pointer;font-size:11px;color:#333;font-family:inherit}
.s-icon{font-size:26px}
.cancel-btn{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;font-size:14px;cursor:pointer;color:#555;font-family:inherit}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;font-size:15px;font-weight:600}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{
  body{background:#fff;padding:0}
  .ctrl-bar,.btn-row{display:none}
  .quote{border:none}
}
</style>
</head>
<body>

<!-- 컨트롤 바 -->
<div class="ctrl-bar">
  <select id="supplier-sel" onchange="changeSupplier()">
    <option value="1">선우컴퓨터 (조리읍 고봉로)</option>
    <option value="2">선우컴퓨터 (일산동구 문촌마을)</option>
  </select>
  <button class="btn-mode active" id="btn-default" onclick="setMode('default')">기본</button>
  <button class="btn-mode" id="btn-blank" onclick="setMode('blank')">공백</button>
</div>

<div class="quote" id="quote">
  <!-- 타이틀 -->
  <div class="q-title">견 &nbsp; 적 &nbsp; 서</div>

  <!-- 상단 박스 -->
  <div class="top-box">
    <div class="top-left">
      <div class="top-left-row" id="date-label"></div>
      <div class="top-left-row" style="margin-top:8px">
        <input id="receiver" placeholder="수신처" style="width:160px;text-align:center">
      </div>
      <div class="top-left-row" style="font-size:11px;color:#555;margin-top:4px">귀하</div>
      <div class="top-left-row" style="margin-top:6px;font-size:11px">아래와 같이 견적합니다.</div>
    </div>
    <div class="top-right">
      <table class="sup-table">
        <tr>
          <td class="s-lbl" rowspan="5">공<br>급<br>자</td>
          <td class="s-lbl2">등록번호</td>
          <td colspan="3" id="s-regno">128-27-25887</td>
        </tr>
        <tr>
          <td class="s-lbl2">상호</td>
          <td colspan="2" id="s-name">선우 컴퓨터<br><span style="font-size:10px">(늑대와여우컴퓨터)</span></td>
          <td class="stamp-cell">대표 박 상 현<img class="stamp-img" id="stamp-img" src="" alt=""></td>
        </tr>
        <tr>
          <td class="s-lbl2">주소</td>
          <td colspan="3" id="s-addr">경기 파주시 조리읍 고봉로 142-3</td>
        </tr>
        <tr>
          <td class="s-lbl2">업태</td>
          <td id="s-biz">서비스</td>
          <td class="s-lbl2">종목</td>
          <td>컴퓨터</td>
        </tr>
        <tr>
          <td class="s-lbl2">전화</td>
          <td colspan="3" id="s-tel">946-1357 / 010-3346-0424</td>
        </tr>
      </table>
    </div>
  </div>

  <!-- 금액 -->
  <div class="amount-row">
    금액 : <input id="total-amount" placeholder="금액 (VAT 포함/별도)"> 
    <select id="vat-type" style="border:none;outline:none;font-size:12px;background:transparent;font-weight:600;font-family:inherit">
      <option value="1">(VAT 포함)</option>
      <option value="2">(VAT 별도)</option>
    </select>
  </div>

  <!-- 품목 테이블 -->
  <div class="items-wrap">
    <table class="items-table">
      <colgroup>
        <col style="width:18%"><col style="width:52%"><col style="width:30%">
      </colgroup>
      <thead>
        <tr><th>분 류</th><th>내 &nbsp;&nbsp;&nbsp; 역</th><th>금 액</th></tr>
      </thead>
      <tbody id="items-body"></tbody>
    </table>
  </div>

  <!-- 하단 -->
  <div class="footer-table" style="display:none" id="bank-row">
    <tr>
      <td style="font-weight:600">● <input id="bank-info" placeholder="농협 000000-00-000000 박상현" style="width:calc(100% - 20px)"></td>
    </tr>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-add" onclick="addRow()">＋ 행 추가</button>
  <button class="btn btn-del" onclick="delRow()">－ 행 삭제</button>
  <button class="btn btn-share" onclick="captureAndShare()">📤 이미지로 공유</button>
</div>

<div class="modal-bg" id="modal">
  <div class="sheet">
    <div class="sheet-title">이미지 공유 방법 선택</div>
    <div class="share-grid">
      <button class="s-btn" onclick="doShare('native')"><span class="s-icon">📤</span>공유하기</button>
      <button class="s-btn" onclick="doShare('kakao')"><span class="s-icon">💬</span>카톡/문자</button>
      <button class="s-btn" onclick="doShare('save')"><span class="s-icon">💾</span>이미지저장</button>
      <button class="s-btn" onclick="doShare('email')"><span class="s-icon">📧</span>이메일</button>
      <button class="s-btn" onclick="doShare('print')"><span class="s-icon">🖨️</span>인쇄</button>
    </div>
    <button class="cancel-btn" id="cancel-btn">취소</button>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div>이미지 생성 중...</div>
</div>

const mm=String(now.getMonth()+1).padStart(2,'0');

    name:'선우 컴퓨터<br><span style="font-size:10px">(늑대와여우컴퓨터)</span>',
    addr:'경기 파주시 조리읍 고봉로 142-3',

    biz:'서비스',
    bank:'농협 217046-56-036735 박상현',
    regno:'128-27-25887'
  },
  '2':{
    name:'선우 컴퓨터',
    addr:'일산동구 중앙로 1471, 문촌마을 13단지내상가 가동 B42호',
    tel:'010-3346-0424',
    biz:'서비스',
    bank:'농협 217046-56-036735 박상현',
    regno:'534-23-01495'
  }

function changeSupplier(){
  const s=suppliers[document.getElementById('supplier-sel').value];
  document.getElementById('s-name').innerHTML=s.name;
  document.getElementById('s-addr').textContent=s.addr;
  document.getElementById('s-tel').textContent=s.tel;
  document.getElementById('s-biz').textContent=s.biz;
  document.getElementById('bank-info').value=s.bank;
  document.getElementById('s-regno').textContent=s.regno||'128-27-25887';
  // 도장 다시 붙이기
  const sc=document.querySelector('.stamp-cell');
  sc.innerHTML='대표 박 상 현<img class="stamp-img" id="stamp-img" src="'+stampSrc+'" alt="">';

const stampSrc=document.getElementById('stamp-img').src;

// 기본/공백 모드
const DEFAULT_ITEMS=['M/B','CPU','RAM','SSD','HDD','VGA','CASE','Power','모니터','키보드/마우스','프린터'];
let currentMode='default';
let rowIds=[];
let capturedBlob=null;

function setMode(mode){
  currentMode=mode;
  document.getElementById('btn-default').classList.toggle('active',mode==='default');
  document.getElementById('btn-blank').classList.toggle('active',mode==='blank');
  buildRows();
}

function buildRows(){
  const tbody=document.getElementById('items-body');
  tbody.innerHTML='';
  rowIds=[];
  if(currentMode==='default'){
    DEFAULT_ITEMS.forEach(name=>addRowWith(name,' ',' '));
    // 추가 빈 행 13개
    for(let i=0;i<13;i++) addRowWith(' ',' ',' ');
  } else {
    for(let i=0;i<24;i++) addRowWith(' ',' ',' ');
  }
  // 계좌 행
  const s=suppliers[document.getElementById('supplier-sel').value];
  document.getElementById('bank-info').value=s.bank;
  document.getElementById('bank-row').style.display='table';
}

function addRowWith(cat,desc,amt){
  const id='r'+Date.now()+'_'+Math.random();
  rowIds.push(id);
  const tr=document.createElement('tr');
  tr.id=id;
  tr.innerHTML=
    '<td><input value="'+cat+'" oninput="updateTotal()"></td>'
    +'<td><input value="'+desc+'" oninput="updateTotal()"></td>'
    +'<td><input class="right" value="'+amt+'" oninput="updateTotal()"></td>';
  document.getElementById('items-body').appendChild(tr);
}

function addRow(){
  addRowWith(' ',' ',' ');
}

function delRow(){
  if(!rowIds.length)return;
  const id=rowIds.pop();
  document.getElementById(id)?.remove();
}

function updateTotal(){
  let total=0;
  document.querySelectorAll('#items-body tr').forEach(tr=>{
    const ins=[...tr.querySelectorAll('input')];
    const v=(ins[2]?.value||'').replace(/[^0-9]/g,'');
    total+=parseInt(v)||0;
  });
  if(total>0){
    document.getElementById('total-amount').value=total.toLocaleString('ko-KR');
  }
}

function inputsToText(el){
  el.querySelectorAll('input,select').forEach(inp=>{
    const span=document.createElement('span');
    if(inp.tagName==='SELECT'){
      span.textContent=inp.options[inp.selectedIndex].text;
    } else {
      span.textContent=inp.value||'';
    }
    span.style.cssText='display:inline;font-size:'+getComputedStyle(inp).fontSize+';color:#333;font-weight:'+getComputedStyle(inp).fontWeight;
    inp.parentNode.replaceChild(span,inp);
  });
}

async function captureAndShare(){
  showLoading(true);
  // A4 = 210x297mm, 96dpi 기준 794x1123px, scale:2 → 1588x2246px
  const A4_W=794;
  const quote=document.getElementById('quote');
  const clone=quote.cloneNode(true);
  clone.style.cssText='position:fixed;left:-9999px;top:0;width:'+A4_W+'px;background:#fff;padding:20px;font-family:Noto Sans KR,sans-serif;font-size:13px';
  const origImg=quote.querySelector('.stamp-img');
  const cloneImg=clone.querySelector('.stamp-img');
  if(origImg&&cloneImg) cloneImg.src=origImg.src;
  inputsToText(clone);
  document.body.appendChild(clone);
  try{
    // 클론 높이 측정 후 A4 높이(1123px)보다 작으면 A4에 맞게 패딩
    const cloneH=clone.offsetHeight;
    const A4_H=1123;
    if(cloneH<A4_H) clone.style.minHeight=A4_H+'px';
    const canvas=await html2canvas(clone,{
      scale:2,
      backgroundColor:'#ffffff',
      useCORS:true,
      allowTaint:true,
      logging:false,
      width:A4_W,
      height:Math.max(cloneH,A4_H)
    });
    document.body.removeChild(clone);
    // A4 비율로 크롭 (2x scale → 1588x2246)
    const a4Canvas=document.createElement('canvas');
    a4Canvas.width=A4_W*2;
    a4Canvas.height=A4_H*2;
    const ctx=a4Canvas.getContext('2d');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,a4Canvas.width,a4Canvas.height);
    ctx.drawImage(canvas,0,0);
    a4Canvas.toBlob(blob=>{capturedBlob=blob;showLoading(false);openShare();},'image/png');
  }catch(e){
    document.body.removeChild(clone);
    showLoading(false);
    alert('이미지 생성 실패: '+e.message);
  }
}

function showLoading(v){document.getElementById('loading').classList[v?'add':'remove']('show')}
function openShare(){document.getElementById('modal').classList.add('open')}
function closeShare(){document.getElementById('modal').classList.remove('open')}
document.getElementById('cancel-btn').onclick=closeShare;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeShare()});

async function doShare(type){
  closeShare();
  if(!capturedBlob){alert('이미지를 먼저 생성해주세요.');return;}
  const receiver=document.getElementById('receiver').value.trim()||'견적서';
  const fname='견적서_'+receiver+'_'+yyyy+mm+dd+'.png';
  const file=new File([capturedBlob],fname,{type:'image/png'});
  const url=URL.createObjectURL(capturedBlob);
  if(type==='native'||type==='kakao'){
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({title:'견적서',files:[file]});}
      catch(e){if(e.name!=='AbortError')fallbackSave(url,fname);}
    } else {fallbackSave(url,fname);}
  } else if(type==='save'){fallbackSave(url,fname);}
  else if(type==='email'){
    fallbackSave(url,fname);
    setTimeout(()=>alert('이미지가 저장되었습니다.\n이메일 앱에서 첨부해 보내세요.'),800);
  } else if(type==='print'){
    const img=new Image();
    img.onload=()=>{const w=window.open('','_blank');w.document.write('<html><body style="margin:0"><img src="'+url+'" style="width:100%"></body></html>');w.document.close();setTimeout(()=>w.print(),500);};
    img.src=url;
  }
}

function fallbackSave(url,name){
  const a=document.createElement('a');a.href=url;a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// 초기화
buildRows();
</script>
